name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    permissions:
      contents: write  # IMPORTANT: Grants write permission
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pywebview pyinstaller
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --icon=app.ico --name=Telecord webview_app.py
    
    - name: Commit and Push EXE
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Copy EXE to root (optional, or keep in dist/)
        # cp dist/Telecord.exe .  # Uncomment if you want it in root
        
        # Add the EXE
        git add dist/Telecord.exe
        
        # Commit if there are changes
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Auto-build: Update Telecord.exe [skip ci]"
          git push
        fi
