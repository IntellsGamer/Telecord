name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pywebview pyinstaller
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --icon=app.ico --name=Telecord webview_app.py
    
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: Telecord-EXE
        path: dist/Telecord.exe
