name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pywebview pyinstaller
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --icon=app.ico --name=Telecord webview_app.py
    
    - name: Commit and Push EXE to Repo
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        
        # Copy EXE to root
        cp dist/Telecord.exe .
        
        # Add and commit
        git add Telecord.exe
        git commit -m "Auto-build: Update Telecord.exe [skip ci]" || echo "No changes to commit"
        
        # Push back to repo
        git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
