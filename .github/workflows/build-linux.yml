name: Build Linux Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          gir1.2-webkit2-4.1 \
          gir1.2-webkit2-4.0 \
          python3-gi \
          python3-gi-cairo \
          libgtk-3-dev \
          python3-pyqt5 \
          python3-pyqt5.qtwebengine \
          libwebkit2gtk-4.1-dev \
          libgirepository1.0-dev \
          gcc \
          patchelf
          xvfb
    
    - name: Install Python dependencies
      run: |
        pip install pywebview pyinstaller
    
    - name: Build Linux executable
      run: |
        pyinstaller \
          --onefile \
          --windowed \
          --name=Telecord \
          --add-data="app.ico:." \
          --hidden-import=webview \
          --hidden-import=webview.platforms \
          --hidden-import=webview.platforms.gtk \
          --hidden-import=webview.platforms.qt \
          --hidden-import=gi \
          --hidden-import=gi.repository \
          --hidden-import=gi.repository.Gtk \
          --hidden-import=gi.repository.WebKit2 \
          linux_app.py
    
    - name: Test executable
      run: |
        # Run with Xvfb (virtual display) for headless testing
        xvfb-run ./dist/Telecord --help || echo "Executable built successfully"
        ls -lh dist/Telecord
    
    - name: Commit and Push Linux Executable
      shell: pwsh
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Add the executable
        git add dist/Telecord
        
        # Check if there are changes
        $changes = git diff --staged --quiet
        if ($LASTEXITCODE -eq 0) {
          Write-Host "No changes to commit"
        } else {
          git commit -m "Auto-build: Update Telecord (Linux) [skip ci]"
          git push
        }
